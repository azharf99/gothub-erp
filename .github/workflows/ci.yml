name: Gothub ERP - Unit Test Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# >>> TAMBAHKAN BLOK INI <<<
# Memaksa GitHub Actions menggunakan Node.js 24 agar warning hilang
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Golang
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true 

    - name: 📦 Download Dependencies
      run: go mod download

    - name: 🧪 Run Unit Tests
      run: go test -v ./...